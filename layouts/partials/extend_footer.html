{{- if .IsHome }}
{{- $companies := slice "apple" "amazon" "lyft" "meta" "tiktok" "netflix" "redbull" "airbnb" "zoom" }}
<section class="companies-strip">
  <h2 class="companies-title">Companies I've Hacked</h2>
  <div class="companies-logos">
    {{- range $companies }}
    <img class="company-logo" src="{{ printf "/images/companies/%s.svg" . | relURL }}" alt="{{ . }}" loading="lazy">
    {{- end }}
  </div>
</section>
<style>
.companies-strip {
  margin: 5rem auto 2.5rem;
  max-width: var(--main-width);
  padding: 0 var(--gap);
  text-align: center;
}
.companies-title {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0.55;
  margin: 0 0 2rem;
}
.companies-logos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 2rem 2.6rem;
}
.company-logo {
  height: 30px;
  width: auto;
  opacity: 0.55;
  filter: brightness(0);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
body.dark .company-logo { filter: brightness(0) invert(1); }
.company-logo:hover { opacity: 1; transform: translateY(-1px); }
@media (max-width: 600px) {
  .companies-logos { gap: 1.4rem 1.8rem; }
  .company-logo { height: 22px; }
}
</style>
{{- end }}
